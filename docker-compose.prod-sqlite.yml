# SQLite-only production setup (no MongoDB required)
# Use this for simpler deployments or single-user scenarios
#
# Usage: docker-compose -f docker-compose.prod-sqlite.yml up -d

services:
  nginx:
    image: nginx:alpine
    container_name: quilltap-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - quilltap-network

  certbot:
    image: certbot/certbot
    container_name: quilltap-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - quilltap-network

  minio:
    image: minio/minio
    container_name: quilltap-minio
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    restart: unless-stopped
    networks:
      - quilltap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing myminio/$${S3_BUCKET:-quilltap-files};
      exit 0;
      "
    networks:
      - quilltap-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: quilltap-app
    expose:
      - "3000"
    volumes:
      # SQLite data directory
      - sqlite-data:/app/data
      # Plugin directories for npm-installed plugins
      - plugin-site-data:/app/plugins/site
      - plugin-user-data:/app/plugins/users
    environment:
      - NODE_ENV=production
      - DOCKER_CONTAINER=true
      - BASE_URL=${BASE_URL:-https://yourdomain.com}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - ENCRYPTION_MASTER_PEPPER=${ENCRYPTION_MASTER_PEPPER}
      # SQLite configuration (no MongoDB)
      - DATABASE_BACKEND=sqlite
      - SQLITE_PATH=/app/data/quilltap.db
      - SQLITE_WAL_MODE=true
      # S3 configuration (embedded MinIO)
      - S3_MODE=external
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-quilltap-files}
      - S3_FORCE_PATH_STYLE=true
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - quilltap-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlite-data:
  minio-data:
  plugin-site-data:
  plugin-user-data:

networks:
  quilltap-network:
    driver: bridge
