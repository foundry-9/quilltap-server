name: Release

on:
  push:
    tags:
      # Matches:
      # - 3.2.1
      # - 3.2.0-dev.21
      # - 3.2.0-beta.1
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

env:
  DOCKER_IMAGE: foundry9/quilltap
  DOCKER_IMAGE_ALT: csebold/quilltap

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' is not valid semver-ish (expected 1.2.3 or 1.2.3-dev.21)"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Shared JS build — runs once, produces platform-agnostic artifacts that
  # every downstream job reuses. Eliminates 5 redundant next build invocations.
  # ────────────────────────────────────────────────────────────────────────────
  build-app:
    name: Build application (shared JS)
    needs: validate-tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugins
        run: npm run build:plugins

      - name: Build Next.js standalone
        run: SKIP_ENV_VALIDATION=true npx next build --webpack

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app-build
          include-hidden-files: true
          path: |
            .next/standalone/
            .next/static/
            plugins/dist/
          retention-days: 5

  # ────────────────────────────────────────────────────────────────────────────
  # Standalone tarball — downloads pre-built JS, strips native modules,
  # creates the tarball that the quilltap npm package downloads on first run.
  # ────────────────────────────────────────────────────────────────────────────
  build-standalone:
    name: Build standalone tarball
    needs: build-app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download pre-built app
        uses: actions/download-artifact@v8
        with:
          name: app-build
          path: .

      - name: Build standalone tarball (skip next build)
        run: npx --yes tsx scripts/build-standalone-tarball.ts --skip-build

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v7
        with:
          name: standalone
          path: quilltap-standalone-*.tar.gz
          retention-days: 5

  # ────────────────────────────────────────────────────────────────────────────
  # Docker + rootfs — builds Docker image from pre-built JS via Dockerfile.ci,
  # pushes to Docker Hub, then exports the filesystem as a rootfs tarball.
  # Combining Docker and rootfs in one job avoids a redundant image build.
  # ────────────────────────────────────────────────────────────────────────────
  build-docker-and-rootfs:
    name: Docker + rootfs (${{ matrix.arch }})
    needs: build-app
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            rootfs_target: wsl2
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            rootfs_target: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download pre-built app
        uses: actions/download-artifact@v8
        with:
          name: app-build
          path: prebuild

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to primary registry
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          target: production
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-${{ matrix.arch }}
          sbom: true
          provenance: mode=max

      - name: Build and push to alt registry
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          target: production
          push: true
          tags: ${{ env.DOCKER_IMAGE_ALT }}:${{ github.ref_name }}-${{ matrix.arch }}
          sbom: true
          provenance: mode=max

      # Build the rootfs target locally — shares buildx layer cache with the
      # push steps above, so this is nearly instant (production layers cached,
      # wsl2 adds only a few lightweight layers on top).
      - name: Build rootfs image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          target: ${{ matrix.rootfs_target }}
          load: true
          tags: quilltap-rootfs:local

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Export rootfs tarball
        run: npx --yes tsx scripts/build-rootfs.ts --image quilltap-rootfs:local --platform ${{ matrix.platform }}

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v7
        with:
          name: rootfs-${{ matrix.arch }}
          path: quilltap-linux-${{ matrix.arch }}.tar.gz
          retention-days: 5

  push-docker-manifest:
    name: Push Docker multi-arch manifest
    runs-on: ubuntu-latest
    needs: build-docker-and-rootfs

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push manifests
        run: |
          TAG="${GITHUB_REF_NAME}"

          for IMAGE in "${DOCKER_IMAGE}" "${DOCKER_IMAGE_ALT}"; do
            TAGS="${IMAGE}:${TAG}"
            if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              TAGS="${TAGS} ${IMAGE}:latest"
            else
              TAGS="${TAGS} ${IMAGE}:dev"
            fi

            for MANIFEST_TAG in $TAGS; do
              docker buildx imagetools create -t "$MANIFEST_TAG" \
                "${IMAGE}:${TAG}-amd64" \
                "${IMAGE}:${TAG}-arm64"
            done
          done

  # ────────────────────────────────────────────────────────────────────────────
  # Electron builds — download pre-built JS, rebuild native modules for each
  # platform's Electron ABI, compile Electron shell, package with
  # electron-builder. macOS also needs rootfs; Windows and Linux do not.
  # ────────────────────────────────────────────────────────────────────────────
  build-electron-mac:
    name: Build Electron (macOS)
    runs-on: macos-latest
    needs: build-docker-and-rootfs

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download pre-built app
        uses: actions/download-artifact@v8
        with:
          name: app-build
          path: .

      - name: Download arm64 rootfs
        uses: actions/download-artifact@v8
        with:
          name: rootfs-arm64
          path: /tmp/rootfs

      - name: Place rootfs in Lima cache
        run: |
          CACHE_DIR="$HOME/Library/Caches/Quilltap/lima-images"
          mkdir -p "$CACHE_DIR"
          cp /tmp/rootfs/quilltap-linux-arm64.tar.gz "$CACHE_DIR/"

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/certificate.XXXXXX.p12)
          echo "$CSC_LINK" | base64 --decode > "$CERT_FILE"

          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_FILE" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/security \
            -f pkcs12

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"' | xargs)

          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm "$CERT_FILE"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Write Apple API key to file
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          KEY_FILE="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "APPLE_API_KEY=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Stage Lima binaries
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: npx tsx scripts/stage-lima.ts

      - name: Build embedded server (skip next build)
        run: npx tsx scripts/build-electron-server.ts --skip-build

      - name: Compile Electron shell
        run: npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        timeout-minutes: 60
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          DEBUG: electron-notarize*
        run: NODE_OPTIONS="-r ./electron/patch-fs.js" npx electron-builder --mac

      - name: Clean up keychain and API key
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$APPLE_API_KEY" || true

      - name: Upload macOS installer
        uses: actions/upload-artifact@v7
        with:
          name: electron-mac
          path: out/*.dmg
          retention-days: 5

  build-electron-win:
    name: Build Electron (Windows)
    runs-on: windows-latest
    needs: build-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download pre-built app
        uses: actions/download-artifact@v8
        with:
          name: app-build
          path: .

      - name: Build embedded server (skip next build)
        run: npx tsx scripts/build-electron-server.ts --skip-build

      - name: Compile Electron shell
        run: npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npx electron-builder --win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: electron-win
          path: out/*.exe
          retention-days: 5

  build-electron-linux:
    name: Build Electron (Linux)
    needs: build-app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download pre-built app
        uses: actions/download-artifact@v8
        with:
          name: app-build
          path: .

      - name: Build embedded server (skip next build)
        run: npx tsx scripts/build-electron-server.ts --skip-build

      - name: Compile Electron shell
        run: npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        run: npx electron-builder --linux

      - name: Upload Linux installers
        uses: actions/upload-artifact@v7
        with:
          name: electron-linux
          path: |
            out/*.AppImage
            out/*.deb
          retention-days: 5

  publish-npm:
    name: Publish quilltap to npm
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine dist-tag
        id: dist-tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Set package version to match release tag
        working-directory: packages/quilltap
        run: npm version "${GITHUB_REF_NAME}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: packages/quilltap
        run: npm publish --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-electron-mac, build-electron-win, build-electron-linux, build-standalone, push-docker-manifest]
    outputs:
      prerelease: ${{ steps.release-type.outputs.prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine release type
        id: release-type
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Check if this is a clean x.y.z tag (no prerelease suffix)
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CLEAN_TAG=true
          else
            CLEAN_TAG=false
          fi

          # Check if the tagged commit is on the release branch
          ON_RELEASE=$(git branch -r --contains HEAD | grep -q 'origin/release' && echo true || echo false)

          # Production release requires clean tag AND release branch
          if [[ "$CLEAN_TAG" == "true" && "$ON_RELEASE" == "true" ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Release type: production"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Release type: prerelease (clean_tag=$CLEAN_TAG, on_release=$ON_RELEASE)"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          PRERELEASE_FLAG=""
          if [[ "${{ steps.release-type.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          cat > /tmp/release-body.md <<'BODY'
          ## Installation

          ### macOS

          1. Download the `.dmg` file and open it
          2. Drag **Quilltap** to your Applications folder
          3. Launch Quilltap from Applications

          ### Windows

          1. Download and run the `.exe` installer
          2. Follow the installation prompts
          3. Launch Quilltap from the Start Menu or desktop shortcut

          ### Linux

          1. Download the `.AppImage` file, make it executable (`chmod +x`), and run it
          2. Or install the `.deb` package: `sudo dpkg -i quilltap_*.deb`
          3. Requires Docker Engine — install from https://docs.docker.com/engine/install/

          ### Node.js (any platform)

          ```bash
          npm install -g quilltap
          quilltap
          ```

          On first run, the CLI downloads the application files (~150-250 MB)
          and caches them locally. Subsequent launches start instantly.

          ### Docker

          ```bash
          docker pull foundry9/quilltap:${TAG}
          # or: docker pull csebold/quilltap:${TAG}
          ```

          Or download the `quilltap-linux-<arch>.tar.gz` rootfs tarball for use with Lima. See the [README](https://github.com/foundry9/quilltap#readme) for setup instructions.
          BODY

          sed -i 's/^          //' /tmp/release-body.md

          gh release create "$TAG" \
            --title "Quilltap $TAG" \
            --notes-file /tmp/release-body.md \
            $PRERELEASE_FLAG \
            artifacts/rootfs-amd64/quilltap-linux-amd64.tar.gz \
            artifacts/rootfs-arm64/quilltap-linux-arm64.tar.gz \
            artifacts/standalone/quilltap-standalone-*.tar.gz \
            artifacts/electron-mac/*.dmg \
            artifacts/electron-win/*.exe \
            artifacts/electron-linux/*.AppImage \
            artifacts/electron-linux/*.deb

  notify-website:
    name: Notify website of release
    runs-on: ubuntu-latest
    needs: [create-release, publish-npm]
    if: always() && needs.create-release.result == 'success'

    steps:
      - name: Trigger website rebuild
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.CROSS_REPO_PAT }}
          repository: foundry-9/quilltap-website
          event-type: app-release
          client-payload: >-
            {
              "version": "${{ github.ref_name }}",
              "prerelease": "${{ needs.create-release.outputs.prerelease }}",
              "docker_image": "foundry9/quilltap:${{ github.ref_name }}",
              "docker_image_alt": "csebold/quilltap:${{ github.ref_name }}"
            }

  github-releases-to-discord:
    runs-on: ubuntu-latest
    needs: create-release
    continue-on-error: true
    steps:
      - name: Notify Discord of release
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_RELEASE_URL }}
          embed-title: "Quilltap ${{ github.ref_name }} Released"
          embed-url: "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          embed-description: "A new version of Quilltap has been published. See the release notes for details."
          embed-color: 5814783
