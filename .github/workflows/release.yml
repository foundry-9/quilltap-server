name: Release

on:
  push:
    tags:
      # Matches:
      # - 3.2.1
      # - 3.2.0-dev.21
      # - 3.2.0-beta.1
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

env:
  DOCKER_IMAGE: csebold/quilltap

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' is not valid semver-ish (expected 1.2.3 or 1.2.3-dev.21)"
            exit 1
          fi

  build-rootfs:
    name: Build rootfs (${{ matrix.arch }})
    needs: validate-tag
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build rootfs tarball
        run: npx tsx scripts/build-rootfs.ts --platform ${{ matrix.platform }}

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.arch }}
          path: quilltap-linux-${{ matrix.arch }}.tar.gz
          retention-days: 5

  build-standalone:
    name: Build standalone tarball
    needs: validate-tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build standalone tarball
        run: npx tsx scripts/build-standalone-tarball.ts

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone
          path: quilltap-standalone-*.tar.gz
          retention-days: 5

  build-docker:
    name: Build Docker (${{ matrix.arch }})
    needs: validate-tag
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push platform image
        run: |
          TAG="${GITHUB_REF_NAME}"
          docker build \
            --target production \
            --tag "${DOCKER_IMAGE}:${TAG}-${{ matrix.arch }}" \
            .
          docker push "${DOCKER_IMAGE}:${TAG}-${{ matrix.arch }}"

  push-docker-manifest:
    name: Push Docker multi-arch manifest
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Determine which tags to create
          TAGS="${DOCKER_IMAGE}:${TAG}"
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAGS="${TAGS} ${DOCKER_IMAGE}:latest"
          else
            TAGS="${TAGS} ${DOCKER_IMAGE}:dev"
          fi

          # Create and push a manifest for each tag
          for MANIFEST_TAG in $TAGS; do
            docker manifest create "$MANIFEST_TAG" \
              "${DOCKER_IMAGE}:${TAG}-amd64" \
              "${DOCKER_IMAGE}:${TAG}-arm64"
            docker manifest push "$MANIFEST_TAG"
          done

  build-electron-mac:
    name: Build Electron (macOS)
    runs-on: macos-latest
    needs: build-rootfs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download arm64 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-arm64
          path: /tmp/rootfs

      - name: Place rootfs in Lima cache
        run: |
          CACHE_DIR="$HOME/Library/Caches/Quilltap/lima-images"
          mkdir -p "$CACHE_DIR"
          cp /tmp/rootfs/quilltap-linux-arm64.tar.gz "$CACHE_DIR/"

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/certificate.XXXXXX.p12)
          echo "$CSC_LINK" | base64 --decode > "$CERT_FILE"
      
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
      
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      
          security import "$CERT_FILE" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/security \
            -f pkcs12
      
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"' | xargs)
      
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      
          rm "$CERT_FILE"
      
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Write Apple API key to file
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          KEY_FILE="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "APPLE_API_KEY=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Build and sign Electron app (macOS)
        timeout-minutes: 60
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          # APPLE_API_KEY is set via GITHUB_ENV in the "Write Apple API key to file" step
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          DEBUG: electron-notarize*
        run: npm run electron:build:mac

      - name: Clean up keychain and API key
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$APPLE_API_KEY" || true

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: out/*.dmg
          retention-days: 5

  build-electron-win:
    name: Build Electron (Windows)
    runs-on: windows-latest
    needs: build-rootfs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (Windows)
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: out/*.exe
          retention-days: 5

  build-electron-linux:
    name: Build Electron (Linux)
    needs: build-rootfs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (Linux)
        run: npm run electron:build:linux

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: |
            out/*.AppImage
            out/*.deb
          retention-days: 5

  publish-npm:
    name: Publish quilltap to npm
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine dist-tag
        id: dist-tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Set package version to match release tag
        working-directory: packages/quilltap
        run: npm version "${GITHUB_REF_NAME}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: packages/quilltap
        run: npm publish --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-electron-mac, build-electron-win, build-electron-linux, build-standalone, push-docker-manifest]
    outputs:
      prerelease: ${{ steps.release-type.outputs.prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine release type
        id: release-type
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Check if this is a clean x.y.z tag (no prerelease suffix)
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CLEAN_TAG=true
          else
            CLEAN_TAG=false
          fi

          # Check if the tagged commit is on the release branch
          ON_RELEASE=$(git branch -r --contains HEAD | grep -q 'origin/release' && echo true || echo false)

          # Production release requires clean tag AND release branch
          if [[ "$CLEAN_TAG" == "true" && "$ON_RELEASE" == "true" ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Release type: production"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Release type: prerelease (clean_tag=$CLEAN_TAG, on_release=$ON_RELEASE)"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          PRERELEASE_FLAG=""
          if [[ "${{ steps.release-type.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          cat > /tmp/release-body.md <<'BODY'
          ## Installation

          ### macOS

          1. Download the `.dmg` file and open it
          2. Drag **Quilltap** to your Applications folder
          3. Launch Quilltap from Applications

          ### Windows

          1. Download and run the `.exe` installer
          2. Follow the installation prompts
          3. Launch Quilltap from the Start Menu or desktop shortcut

          ### Linux

          1. Download the `.AppImage` file, make it executable (`chmod +x`), and run it
          2. Or install the `.deb` package: `sudo dpkg -i quilltap_*.deb`
          3. Requires Docker Engine — install from https://docs.docker.com/engine/install/

          ### Node.js (any platform)

          ```bash
          npm install -g quilltap
          quilltap
          ```

          On first run, the CLI downloads the application files (~150-250 MB)
          and caches them locally. Subsequent launches start instantly.

          ### Docker

          ```bash
          docker pull csebold/quilltap:${TAG}
          ```

          Or download the `quilltap-linux-<arch>.tar.gz` rootfs tarball for use with Lima. See the [README](https://github.com/foundry-9/quilltap#readme) for setup instructions.
          BODY

          sed -i 's/^          //' /tmp/release-body.md

          gh release create "$TAG" \
            --title "Quilltap $TAG" \
            --notes-file /tmp/release-body.md \
            $PRERELEASE_FLAG \
            artifacts/rootfs-amd64/quilltap-linux-amd64.tar.gz \
            artifacts/rootfs-arm64/quilltap-linux-arm64.tar.gz \
            artifacts/standalone/quilltap-standalone-*.tar.gz \
            artifacts/electron-mac/*.dmg \
            artifacts/electron-win/*.exe \
            artifacts/electron-linux/*.AppImage \
            artifacts/electron-linux/*.deb

  notify-website:
    name: Notify website of release
    runs-on: ubuntu-latest
    needs: [create-release, publish-npm]
    if: always() && needs.create-release.result == 'success'

    steps:
      - name: Trigger website rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_PAT }}
          repository: foundry-9/quilltap-website
          event-type: app-release
          client-payload: >-
            {
              "version": "${{ github.ref_name }}",
              "prerelease": "${{ needs.create-release.outputs.prerelease }}",
              "docker_image": "csebold/quilltap:${{ github.ref_name }}"
            }

  github-releases-to-discord:
    runs-on: ubuntu-latest
    needs: create-release
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: GitHub Releases to Discord
        uses: SethCohen/github-releases-to-discord@v1
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_RELEASE_URL }}
