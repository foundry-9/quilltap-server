# SQLite-only production setup (no MongoDB required)
# Use this for simpler deployments or when MongoDB is not available
#
# Usage: docker-compose up
#
# =============================================================================
# DATA DIRECTORY CONFIGURATION
# =============================================================================
#
# QUILLTAP_HOST_DATA_DIR - Where your Quilltap data lives on the HOST machine.
#   This is the directory on your computer that gets mounted into the container.
#   Default: ~/.quilltap
#
#   To use a different location:
#     QUILLTAP_HOST_DATA_DIR=/path/to/data docker-compose up
#
#   Platform-specific recommended paths:
#     Linux:   ~/.quilltap (default)
#     macOS:   ~/Library/Application Support/Quilltap
#     Windows: %APPDATA%\Quilltap
#
# Note: Inside the container, the app always sees /app/quilltap - that's just
# the mount point. Your actual data lives at QUILLTAP_HOST_DATA_DIR on the host.
#
# For non-Docker installations, use QUILLTAP_DATA_DIR instead (see lib/paths.ts).
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DOCKER_CONTAINER=true
      - BASE_URL=http://localhost:3000
      # SQLite configuration (no MongoDB)
      - DATABASE_BACKEND=sqlite
      - SQLITE_PATH=/app/quilltap/data/quilltap.db
      - SQLITE_WAL_MODE=true
    env_file:
      - .env.local
    volumes:
      # All Quilltap data (database, files, logs, plugins) in one directory
      - ${QUILLTAP_HOST_DATA_DIR:-~/.quilltap}:/app/quilltap
