name: Docker

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'  # e.g., 3.0.0, 3.1.0-beta.1

env:
  IMAGE: csebold/quilltap

jobs:
  build-image:
    name: Build Docker (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push platform image
        run: |
          TAG="${GITHUB_REF_NAME}"
          docker build \
            --target production \
            --tag "${IMAGE}:${TAG}-${{ matrix.arch }}" \
            .
          docker push "${IMAGE}:${TAG}-${{ matrix.arch }}"

  push-manifest:
    name: Create and push multi-arch manifest
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Determine which tags to create
          TAGS="${IMAGE}:${TAG}"
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAGS="${TAGS} ${IMAGE}:latest"
          else
            TAGS="${TAGS} ${IMAGE}:dev"
          fi

          # Create and push a manifest for each tag
          for MANIFEST_TAG in $TAGS; do
            docker manifest create "$MANIFEST_TAG" \
              "${IMAGE}:${TAG}-amd64" \
              "${IMAGE}:${TAG}-arm64"
            docker manifest push "$MANIFEST_TAG"
          done
