publish: null
appId: com.foundry9.quilltap
productName: Quilltap
directories:
  output: out
  buildResources: electron/resources
files:
  # Include compiled Electron code and splash screen assets
  - dist-electron/**/*
  - electron/splash/**/*
  - package.json
  # Exclude node_modules - Electron code uses zero npm deps (only Node builtins + Electron APIs)
  - "!node_modules"
  # Exclude everything else from the project (src, config, etc.)
  # The negation patterns prevent the entire project from being bundled.
  - "!app/**/*"
  - "!components/**/*"
  - "!lib/**/*"
  - "!public/**/*"
  - "!scripts/**/*"
  - "!lima/**/*"
  - "!features/**/*"
  - "!docs/**/*"
  - "!help/**/*"
  - "!migrations/**/*"
  - "!plugins/**/*"
  - "!packages/**/*"
  - "!__tests__/**/*"
  - "!.githooks/**/*"
# Native modules are rebuilt in build-electron-server.ts against Electron's Node ABI.
# Disable electron-builder's own @electron/rebuild to prevent it from scanning the
# project's node_modules (which contains .bin symlinks that break macOS codesign).
npmRebuild: false
afterSign: electron/notarize.js
extraResources:
  # Embedded server: Next.js standalone output + static assets + public files + plugins
  # NOTE: node_modules is renamed to _modules in the staging step because
  # electron-builder has a hardcoded node_modules exclusion for extraResources.
  # The embedded server sets NODE_PATH to find _modules at runtime.
  - from: .electron-server-staging/
    to: server/
    filter:
      - "**/*"
mac:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  category: public.app-category.productivity
  notarize: false  # We handle notarization in afterSign hook (electron/notarize.js)
  target:
    - target: dmg
      arch:
        - arm64
  hardenedRuntime: true
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist
  icon: electron/resources/icon.icns
  signIgnore:
    - "lima/share/lima/lima-guestagent"
  extraResources:
    - from: lima/quilltap.yaml
      to: lima/quilltap.yaml
    - from: electron/resources/lima/
      to: lima/
win:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Quilltap
linux:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  icon: electron/resources/icon.png
