appId: com.foundry9.quilltap
productName: Quilltap
directories:
  output: out
  buildResources: electron/resources
files:
  # Include compiled Electron code and splash screen assets
  - dist-electron/**/*
  - electron/splash/**/*
  # Exclude everything else from the project (node_modules, src, etc.)
  # The negation patterns prevent the entire project from being bundled.
  - "!app/**/*"
  - "!components/**/*"
  - "!lib/**/*"
  - "!public/**/*"
  - "!scripts/**/*"
  - "!lima/**/*"
  - "!features/**/*"
  - "!docs/**/*"
  - "!help/**/*"
  - "!migrations/**/*"
  - "!plugins/**/*"
  - "!packages/**/*"
  - "!__tests__/**/*"
  - "!.storybook/**/*"
  - "!.githooks/**/*"
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  # hardenedRuntime requires a valid Apple Developer signing identity.
  # Set to true and uncomment identity/entitlements when distributing signed builds.
  hardenedRuntime: false
  identity: null
  # entitlements: electron/entitlements.mac.plist
  # entitlementsInherit: electron/entitlements.mac.plist
  icon: electron/resources/icon.icns
  extraResources:
    - from: lima/quilltap.yaml
      to: lima/quilltap.yaml
    # Lima binaries staged by scripts/stage-lima.sh
    - from: electron/resources/lima/
      to: lima/
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Quilltap
