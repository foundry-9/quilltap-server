name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'  # e.g., 3.0.0, 3.1.0-beta.1

permissions:
  contents: write

jobs:
  build-rootfs:
    name: Build rootfs (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for cross-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Build rootfs tarball
        run: ./scripts/build-rootfs.sh --platform ${{ matrix.platform }}

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.arch }}
          path: quilltap-linux-${{ matrix.arch }}.tar.gz
          retention-days: 5

  build-electron-mac:
    name: Build Electron (macOS)
    runs-on: macos-latest
    needs: build-rootfs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download arm64 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-arm64
          path: /tmp/rootfs

      - name: Place rootfs in Lima cache
        run: |
          CACHE_DIR="$HOME/Library/Caches/Quilltap/lima-images"
          mkdir -p "$CACHE_DIR"
          cp /tmp/rootfs/quilltap-linux-arm64.tar.gz "$CACHE_DIR/"

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Decode the base64 cert to a temp file
          CERT_FILE=$(mktemp /tmp/certificate.XXXXXX.p12)
          echo "$CSC_LINK" | base64 --decode > "$CERT_FILE"

          # Create a temporary keychain
          KEYCHAIN_PATH=$(mktemp -d)/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import cert into the temporary keychain
          security import "$CERT_FILE" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the key without UI prompts
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Clean up cert file
          rm "$CERT_FILE"

          # Export keychain path for subsequent steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Build and sign Electron app (macOS)
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run electron:build:mac

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: out/*.dmg
          retention-days: 5

  build-electron-win:
    name: Build Electron (Windows)
    runs-on: windows-latest
    needs: build-rootfs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (Windows)
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: out/*.exe
          retention-days: 5

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-electron-mac, build-electron-win]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          cat > /tmp/release-body.md <<'BODY'
          ## Installation

          ### macOS

          1. Download the `.dmg` file and open it
          2. Drag **Quilltap** to your Applications folder
          3. Launch Quilltap from Applications

          ### Windows

          1. Download and run the `.exe` installer
          2. Follow the installation prompts
          3. Launch Quilltap from the Start Menu or desktop shortcut

          ### Docker / Linux

          Download the `quilltap-linux-<arch>.tar.gz` rootfs tarball for use with Docker or Lima. See the [README](https://github.com/foundry-9/quilltap#readme) for setup instructions.
          BODY

          sed -i 's/^          //' /tmp/release-body.md

          gh release create "$TAG" \
            --title "Quilltap $TAG" \
            --notes-file /tmp/release-body.md \
            artifacts/rootfs-amd64/quilltap-linux-amd64.tar.gz \
            artifacts/rootfs-arm64/quilltap-linux-arm64.tar.gz \
            artifacts/electron-mac/*.dmg \
            artifacts/electron-win/*.exe
