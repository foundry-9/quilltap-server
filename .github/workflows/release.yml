name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'  # e.g., 3.0.0, 3.1.0-beta.1

permissions:
  contents: write

jobs:
  build-rootfs:
    name: Build rootfs (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build rootfs tarball
        run: npx tsx scripts/build-rootfs.ts --platform ${{ matrix.platform }}

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.arch }}
          path: quilltap-linux-${{ matrix.arch }}.tar.gz
          retention-days: 5

  build-electron-mac:
    name: Build Electron (macOS)
    runs-on: macos-latest
    needs: build-rootfs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download arm64 rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-arm64
          path: /tmp/rootfs

      - name: Place rootfs in Lima cache
        run: |
          CACHE_DIR="$HOME/Library/Caches/Quilltap/lima-images"
          mkdir -p "$CACHE_DIR"
          cp /tmp/rootfs/quilltap-linux-arm64.tar.gz "$CACHE_DIR/"

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/certificate.XXXXXX.p12)
          echo "$CSC_LINK" | base64 --decode > "$CERT_FILE"
      
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
      
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      
          security import "$CERT_FILE" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/security \
            -f pkcs12
      
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"' | xargs)
      
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      
          rm "$CERT_FILE"
      
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Write Apple API key to file
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          KEY_FILE="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "APPLE_API_KEY=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Build and sign Electron app (macOS)
        timeout-minutes: 60
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          DEBUG: electron-notarize*
        run: npm run electron:build:mac

      - name: Clean up keychain and API key
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$APPLE_API_KEY" || true

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: out/*.dmg
          retention-days: 5

  build-electron-win:
    name: Build Electron (Windows)
    runs-on: windows-latest
    needs: build-rootfs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (Windows)
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: out/*.exe
          retention-days: 5

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-electron-mac, build-electron-win]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine release type
        id: release-type
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Check if this is a clean x.y.z tag (no prerelease suffix)
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CLEAN_TAG=true
          else
            CLEAN_TAG=false
          fi

          # Check if the tagged commit is on the release branch
          ON_RELEASE=$(git branch -r --contains HEAD | grep -q 'origin/release' && echo true || echo false)

          # Production release requires clean tag AND release branch
          if [[ "$CLEAN_TAG" == "true" && "$ON_RELEASE" == "true" ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Release type: production"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Release type: prerelease (clean_tag=$CLEAN_TAG, on_release=$ON_RELEASE)"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          PRERELEASE_FLAG=""
          if [[ "${{ steps.release-type.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          cat > /tmp/release-body.md <<'BODY'
          ## Installation

          ### macOS

          1. Download the `.dmg` file and open it
          2. Drag **Quilltap** to your Applications folder
          3. Launch Quilltap from Applications

          ### Windows

          1. Download and run the `.exe` installer
          2. Follow the installation prompts
          3. Launch Quilltap from the Start Menu or desktop shortcut

          ### Docker / Linux

          Download the `quilltap-linux-<arch>.tar.gz` rootfs tarball for use with Docker or Lima. See the [README](https://github.com/foundry-9/quilltap#readme) for setup instructions.
          BODY

          sed -i 's/^          //' /tmp/release-body.md

          gh release create "$TAG" \
            --title "Quilltap $TAG" \
            --notes-file /tmp/release-body.md \
            $PRERELEASE_FLAG \
            artifacts/rootfs-amd64/quilltap-linux-amd64.tar.gz \
            artifacts/rootfs-arm64/quilltap-linux-arm64.tar.gz \
            artifacts/electron-mac/*.dmg \
            artifacts/electron-win/*.exe
