# SQLite-only development setup (no MongoDB required)
# Use this for simpler deployments or when MongoDB is not available
#
# Usage: docker-compose -f docker-compose.sqlite.yml up
#
# Data is stored in ${QUILLTAP_HOST_DATA_DIR:-~/.quilltap} on the host
# To use a different location, set the QUILLTAP_HOST_DATA_DIR environment variable:
#   QUILLTAP_HOST_DATA_DIR=/path/to/data docker-compose -f docker-compose.sqlite.yml up
#
# Platform-specific recommended paths:
#   Linux:   ~/.quilltap (default)
#   macOS:   ~/Library/Application Support/Quilltap
#   Windows: %APPDATA%\Quilltap

services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/quilltap-files;
      exit 0;
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DOCKER_CONTAINER=true
      - BASE_URL=https://localhost:3000
      # SQLite configuration (no MongoDB)
      - DATABASE_BACKEND=sqlite
      - SQLITE_PATH=/app/quilltap/data/quilltap.db
      - SQLITE_WAL_MODE=true
      # S3 configuration (embedded MinIO)
      - S3_MODE=external
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=quilltap-files
      - S3_FORCE_PATH_STYLE=true
    env_file:
      - .env.local
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
      - ${QUILLTAP_HOST_DATA_DIR:-~/.quilltap}:/app/quilltap
      - /app/.next
    command: npm run devssl

volumes:
  minio-data:
  app-node-modules:
